<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monitor de Tópicos</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #fff;
      --border: #ebebeb;
      --text: #1a1a1a;
      --muted: #8e8e8e;
      --accent: #0095f6;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    header h1 span { color: var(--accent); }

    .search-wrap {
      flex: 1;
      min-width: 180px;
    }

    #search {
      width: 100%;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }

    #search:focus { border-color: var(--accent); }

    /* ── Config Banner ── */
    #config-banner {
      max-width: 960px;
      margin: 20px auto 0;
      padding: 0 20px;
    }

    .config-box {
      background: #eef6ff;
      border: 1px solid #b3d7ff;
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .config-box p { font-size: 13px; color: #444; line-height: 1.5; }
    .config-box strong { color: var(--text); }

    .config-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #sheet-url {
      flex: 1;
      min-width: 240px;
      padding: 8px 12px;
      border: 1px solid #b3d7ff;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    #sheet-url:focus { border-color: var(--accent); }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    button:hover { opacity: .85; }

    #load-btn {
      background: var(--accent);
      color: #fff;
    }

    /* ── Topic Filter Chips ── */
    #chips {
      max-width: 960px;
      margin: 16px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .15s;
    }

    .chip.active {
      border-color: currentColor;
    }

    /* ── Feed Grid ── */
    #feed {
      max-width: 960px;
      margin: 20px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }

    .card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .topic-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .card-date {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .card-body {
      padding: 0 16px 14px;
      flex: 1;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .card-url {
      font-size: 11px;
      color: #bbb;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }

    .open-link {
      display: block;
      text-align: center;
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      padding: 6px;
      border-radius: 6px;
      transition: background .15s;
    }

    .open-link:hover { background: #eef6ff; }

    /* ── Embeds ── */
    .card--video { grid-column: span 1; }

    .embed-wrap {
      width: 100%;
      background: #000;
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }

    .embed-youtube {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .embed-youtube iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .embed-instagram, .embed-tiktok {
      display: flex;
      justify-content: center;
      background: #fafafa;
    }

    .embed-instagram iframe { width: 100%; height: 560px; border: none; }
    .embed-tiktok  iframe { width: 100%; height: 700px; border: none; }

    /* ── States ── */
    #status {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Date filter bar ── */
    .filter-bar {
      max-width: 960px;
      margin: 10px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-bar-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-right: 2px;
    }

    .date-btn {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all .15s;
    }

    .date-btn:hover { border-color: #aaa; color: var(--text); }
    .date-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* ── Article image preview ── */
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--border);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }

    .card:hover .card-img { transform: scale(1.03); }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      #feed { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<!-- ── CONFIGURAÇÃO ───────────────────────────────── -->
<!--
  COMO USAR:
  1. Crie uma planilha Google Sheets com as colunas:
       link | data | topico | titulo | descricao
     (as duas últimas são opcionais mas aparecem no card)

  2. Publique a planilha:
       Arquivo → Compartilhar → Publicar na web
       Escolha: Planilha inteira → Valores separados por vírgula (.csv)
       Clique em "Publicar" e copie o link gerado.

  3. Cole o link no campo abaixo e clique em "Carregar".
     O link salvo fica no navegador (localStorage) — não precisa repetir.
-->

<header>
  <div class="header-inner">
    <h1>Monitor<span>.</span></h1>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Buscar links, tópicos..." />
    </div>
  </div>
</header>

<div id="config-banner">
  <div class="config-box">
    <p>
      <strong>Configure a planilha:</strong> cole abaixo o link CSV do Google Sheets
      (Arquivo → Publicar na web → CSV). Colunas esperadas:
      <code>link</code>, <code>data</code>, <code>topico</code>, <code>titulo</code> (opcional), <code>descricao</code> (opcional).
    </p>
    <div class="config-row">
      <input id="sheet-url" type="url" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" />
      <button id="load-btn">Carregar</button>
      <button id="clear-btn" style="background:#f0f0f0;color:#555;">Limpar</button>
    </div>
  </div>
</div>

<div id="chips"></div>
<div id="date-filters" class="filter-bar"></div>
<div id="status"></div>
<div id="feed"></div>

<script>
  // ── Paleta de cores por tópico (gerada por hash) ──────────────────────────
  const PALETTES = [
    { bg: '#fde8f0', text: '#c0185a' },
    { bg: '#e8f4fd', text: '#0a6dac' },
    { bg: '#e8fdf0', text: '#1a8a45' },
    { bg: '#fdf4e8', text: '#a05a00' },
    { bg: '#f0e8fd', text: '#6a1fbd' },
    { bg: '#fdf0e8', text: '#c04010' },
    { bg: '#e8fdfc', text: '#0a8a7a' },
    { bg: '#fdfce8', text: '#7a7a00' },
  ];

  function topicColor(topic) {
    let h = 0;
    for (let i = 0; i < topic.length; i++) h = (h * 31 + topic.charCodeAt(i)) & 0xffffff;
    return PALETTES[Math.abs(h) % PALETTES.length];
  }

  // ── Estado ────────────────────────────────────────────────────────────────
  let allItems = [];
  let activeTopics = new Set();
  let searchQuery = '';
  let dateFilter = 'all'; // 'all' | 'today' | '7d' | '30d'

  // ── Metadata cache (localStorage) ────────────────────────────────────────
  const META_KEY = 'monitor_meta_v1';
  function getMeta(url) {
    try {
      const c = JSON.parse(localStorage.getItem(META_KEY) || '{}');
      const e = c[url];
      if (e && Date.now() - e._ts < 86400000) return e; // 24h TTL
    } catch {}
    return null;
  }
  function saveMeta(url, data) {
    try {
      const c = JSON.parse(localStorage.getItem(META_KEY) || '{}');
      c[url] = { ...data, _ts: Date.now() };
      const keys = Object.keys(c);
      if (keys.length > 300) delete c[keys[0]];
      localStorage.setItem(META_KEY, JSON.stringify(c));
    } catch {}
  }

  // ── Persist URL ───────────────────────────────────────────────────────────
  const STORAGE_KEY = 'monitor_sheet_url';

  function savedUrl() {
    try { return localStorage.getItem(STORAGE_KEY) || ''; } catch { return ''; }
  }

  function saveUrl(url) {
    try { localStorage.setItem(STORAGE_KEY, url); } catch {}
  }

  // ── CSV Parser ────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];

    const headers = splitCSVRow(lines[0]).map(h => h.trim().toLowerCase());

    return lines.slice(1).map(line => {
      const vals = splitCSVRow(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
      return obj;
    }).filter(r => r.link);
  }

  function splitCSVRow(row) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') {
        if (inQ && row[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        result.push(cur); cur = '';
      } else {
        cur += c;
      }
    }
    result.push(cur);
    return result;
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function fetchCSV(url) {
    try {
      const res = await fetch(url, { redirect: 'follow' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    } catch (e) {
      const isLocal = window.location.protocol === 'file:';
      if (isLocal) {
        throw new Error(
          'O arquivo está aberto localmente e o Chrome bloqueia esse acesso por segurança.<br><br>' +
          '<strong>Solução em 30 segundos:</strong> acesse <a href="https://netlify.com/drop" target="_blank" style="color:var(--accent)">netlify.com/drop</a>, ' +
          'arraste este arquivo HTML e use a URL gerada. Aí funciona direto.'
        );
      }
      throw new Error(e.message);
    }
  }

  async function loadSheet(url) {
    setStatus('<div class="spinner"></div><br>Carregando planilha…');
    clearFeed();

    try {
      const text = await fetchCSV(url);
      allItems = parseCSV(text);
      activeTopics.clear();
      renderChips();
      renderDateFilters();
      renderFeed();
      setStatus('');
      saveUrl(url);
    } catch (e) {
      setStatus(`❌ Erro ao carregar: ${e.message}<br><small>Verifique se o link CSV está correto e a planilha está publicada.</small>`);
    }
  }

  // ── Date filters ─────────────────────────────────────────────────────────
  function renderDateFilters() {
    const el = document.getElementById('date-filters');
    el.innerHTML = '';
    const options = [
      { id: 'all',   label: 'Tudo' },
      { id: 'today', label: 'Hoje' },
      { id: '7d',    label: '7 dias' },
      { id: '30d',   label: '30 dias' },
    ];
    const lbl = document.createElement('span');
    lbl.className = 'filter-bar-label';
    lbl.textContent = 'Período:';
    el.appendChild(lbl);
    options.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'date-btn' + (dateFilter === o.id ? ' active' : '');
      btn.textContent = o.label;
      btn.dataset.id = o.id;
      btn.addEventListener('click', () => {
        dateFilter = o.id;
        document.querySelectorAll('.date-btn').forEach(b => b.classList.toggle('active', b.dataset.id === o.id));
        renderFeed();
      });
      el.appendChild(btn);
    });
  }

  function filterByDate(items) {
    if (dateFilter === 'all') return items;
    const now = Date.now();
    const cutoff = {
      today: now - 86400000,
      '7d':  now - 7  * 86400000,
      '30d': now - 30 * 86400000,
    }[dateFilter];
    return items.filter(r => parseDate(r.data) >= cutoff);
  }

  // ── Render Chips ──────────────────────────────────────────────────────────
  function renderChips() {
    const topics = [...new Set(allItems.map(r => r.topico || r['tópico'] || '').filter(Boolean))].sort();
    const el = document.getElementById('chips');
    el.innerHTML = '';

    if (!topics.length) return;

    const all = makeChip('Todos', true);
    all.addEventListener('click', () => { activeTopics.clear(); syncChips(); renderFeed(); });
    el.appendChild(all);

    topics.forEach(t => {
      const c = makeChip(t, false);
      const col = topicColor(t);
      c.style.background = col.bg;
      c.style.color = col.text;
      c.addEventListener('click', () => {
        if (activeTopics.has(t)) activeTopics.delete(t);
        else activeTopics.add(t);
        syncChips();
        renderFeed();
      });
      el.appendChild(c);
    });
  }

  function makeChip(label, active) {
    const c = document.createElement('span');
    c.className = 'chip' + (active ? ' active' : '');
    c.textContent = label;
    c.dataset.label = label;
    if (label === 'Todos') {
      c.style.background = '#1a1a1a';
      c.style.color = '#fff';
    }
    return c;
  }

  function syncChips() {
    document.querySelectorAll('.chip').forEach(c => {
      const lbl = c.dataset.label;
      if (lbl === 'Todos') {
        c.classList.toggle('active', activeTopics.size === 0);
      } else {
        c.classList.toggle('active', activeTopics.has(lbl));
      }
    });
  }

  // ── Render Feed ───────────────────────────────────────────────────────────
  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    const q = searchQuery.toLowerCase();
    let items = allItems
      .filter(r => {
        const topic = r.topico || r['tópico'] || '';
        if (activeTopics.size && !activeTopics.has(topic)) return false;
        if (q) {
          const haystack = [r.link, topic, r.titulo || r['título'] || '', r.descricao || r['descrição'] || ''].join(' ').toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });

    items = filterByDate(items);
    items.sort((a, b) => parseDate(b.data) - parseDate(a.data));

    if (!items.length) {
      setStatus('Nenhum resultado encontrado.');
      return;
    }

    setStatus('');
    items.forEach(r => feed.appendChild(makeCard(r)));
    enrichArticleCards(items);
  }

  // ── Enrich article cards with OG image/title via microlink ───────────────
  async function enrichArticleCards(items) {
    for (const r of items) {
      if (getEmbed(r.link)) continue; // skip video cards
      const titleEl = document.querySelector(`[data-card-url="${CSS.escape(r.link)}"] .card-title`);
      const imgWrap = document.querySelector(`[data-card-url="${CSS.escape(r.link)}"] .card-img-wrap`);
      if (!imgWrap) continue;

      // Check cache first
      const cached = getMeta(r.link);
      if (cached) {
        applyMeta(r.link, cached);
        continue;
      }

      try {
        const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(r.link));
        if (!res.ok) continue;
        const json = await res.json();
        const data = json.data || {};
        const meta = {
          img: data.image?.url || data.screenshot?.url || null,
          title: data.title || null,
          desc: data.description || null,
        };
        saveMeta(r.link, meta);
        applyMeta(r.link, meta);
      } catch {}
    }
  }

  function applyMeta(url, meta) {
    const card = document.querySelector(`[data-card-url="${CSS.escape(url)}"]`);
    if (!card) return;
    if (meta.img) {
      const wrap = card.querySelector('.card-img-wrap');
      if (wrap && !wrap.querySelector('img')) {
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = meta.img;
        img.alt = '';
        img.loading = 'lazy';
        wrap.appendChild(img);
      }
    }
    if (meta.title) {
      const titleEl = card.querySelector('.card-title');
      if (titleEl && !titleEl.textContent.trim()) titleEl.textContent = meta.title;
    }
    if (meta.desc) {
      const descEl = card.querySelector('.card-desc');
      if (descEl && !descEl.textContent.trim()) descEl.textContent = meta.desc;
    }
  }

  function parseDate(s) {
    if (!s) return 0;
    // supports dd/mm/yyyy, yyyy-mm-dd, dd-mm-yyyy
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (iso) return new Date(s).getTime();
    const br = s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})$/);
    if (br) return new Date(`${br[3]}-${br[2]}-${br[1]}`).getTime();
    return new Date(s).getTime() || 0;
  }

  function formatDate(s) {
    const ts = parseDate(s);
    if (!ts) return s;
    return new Date(ts).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // ── Embed detection ──────────────────────────────────────────────────────
  function getEmbed(url) {
    try {
      const u = new URL(url);
      const h = u.hostname.replace('www.', '');
      const p = u.pathname;

      // YouTube
      if (h === 'youtube.com' || h === 'm.youtube.com') {
        const v = u.searchParams.get('v');
        if (v) return { type: 'youtube', id: v };
        const shorts = p.match(/\/shorts\/([^/?]+)/);
        if (shorts) return { type: 'youtube', id: shorts[1] };
      }
      if (h === 'youtu.be') {
        const id = p.replace('/', '').split('?')[0];
        if (id) return { type: 'youtube', id };
      }

      // Instagram
      if (h === 'instagram.com') {
        const reel = p.match(/\/reel\/([^/?]+)/);
        if (reel) return { type: 'instagram', path: `reel/${reel[1]}` };
        const post = p.match(/\/p\/([^/?]+)/);
        if (post) return { type: 'instagram', path: `p/${post[1]}` };
      }

      // TikTok
      if (h === 'tiktok.com' || h === 'vm.tiktok.com') {
        const vid = p.match(/\/video\/(\d+)/);
        if (vid) return { type: 'tiktok', id: vid[1] };
      }

    } catch {}
    return null;
  }

  function embedHTML(embed) {
    if (!embed) return '';
    if (embed.type === 'youtube') {
      return `<div class="embed-wrap"><div class="embed-youtube">
        <iframe src="https://www.youtube.com/embed/${embed.id}?rel=0" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div></div>`;
    }
    if (embed.type === 'instagram') {
      return `<div class="embed-wrap"><div class="embed-instagram">
        <iframe src="https://www.instagram.com/${embed.path}/embed/" scrolling="no"
          allowtransparency="true" allowfullscreen></iframe>
      </div></div>`;
    }
    if (embed.type === 'tiktok') {
      return `<div class="embed-wrap"><div class="embed-tiktok">
        <iframe src="https://www.tiktok.com/embed/v2/${embed.id}"
          allowfullscreen allow="encrypted-media"></iframe>
      </div></div>`;
    }
    return '';
  }

  function makeCard(r) {
    const topic = r.topico || r['tópico'] || '';
    const title = r.titulo || r['título'] || '';
    const desc  = r.descricao || r['descrição'] || '';
    const col   = topicColor(topic || '?');
    const embed = getEmbed(r.link);

    const card = document.createElement('article');
    card.className = 'card' + (embed ? ' card--video' : '');
    card.dataset.cardUrl = r.link;

    const domain = (() => {
      try { return new URL(r.link).hostname.replace('www.', ''); } catch { return r.link; }
    })();

    // For article cards: show image placeholder (filled async by enrichArticleCards)
    const articleImg = !embed ? `<div class="card-img-wrap"></div>` : '';

    card.innerHTML = `
      ${embed ? embedHTML(embed) : articleImg}
      <div class="card-header">
        ${topic ? `<span class="topic-badge" style="background:${col.bg};color:${col.text}">${esc(topic)}</span>` : '<span></span>'}
        <span class="card-date">${esc(formatDate(r.data))}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(title)}</div>
        <div class="card-desc">${esc(desc)}</div>
        ${!embed ? `<div class="card-url">${esc(domain)}</div>` : ''}
      </div>
      <div class="card-footer">
        <a class="open-link" href="${esc(r.link)}" target="_blank" rel="noopener">Abrir no ${esc(domain)} →</a>
      </div>
    `;

    return card;
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function clearFeed() {
    document.getElementById('feed').innerHTML = '';
    document.getElementById('chips').innerHTML = '';
    document.getElementById('date-filters').innerHTML = '';
  }

  function setStatus(html) {
    document.getElementById('status').innerHTML = html;
  }

  // ── Events ────────────────────────────────────────────────────────────────
  document.getElementById('load-btn').addEventListener('click', () => {
    const url = document.getElementById('sheet-url').value.trim();
    if (!url) return;
    loadSheet(url);
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    document.getElementById('sheet-url').value = '';
    allItems = [];
    activeTopics.clear();
    clearFeed();
    setStatus('');
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderFeed();
  });

  // ── Auto-load saved URL ───────────────────────────────────────────────────
  const saved = savedUrl();
  if (saved) {
    document.getElementById('sheet-url').value = saved;
    loadSheet(saved);
  }
</script>
</body>
</html>
